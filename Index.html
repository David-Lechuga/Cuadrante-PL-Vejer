<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cuadrante Policía Local</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #111827;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            z-index: 9999;
        }

    </style>

</head>

<body>

<div class="max-w-6xl mx-auto p-4">

    <div class="card mt-6">

        <h1 class="text-4xl font-bold text-center mb-8">
            Cuadrante Policía Local
        </h1>

        <!-- SELECTORES -->

        <div class="grid md:grid-cols-2 gap-4 mb-6">

            <!-- DIA -->

            <div>

                <label class="block mb-2 font-semibold">
                    Día
                </label>

                <select
                    id="dia"
                    class="w-full border rounded-lg p-3"
                >
                </select>

            </div>

            <!-- MES -->

            <div>

                <label class="block mb-2 font-semibold">
                    Mes
                </label>

                <select
                    id="mes"
                    class="w-full border rounded-lg p-3"
                >

                    <option value="ENERO">Enero</option>
                    <option value="FEBRERO">Febrero</option>
                    <option value="MARZO">Marzo</option>
                    <option value="ABRIL">Abril</option>
                    <option value="MAYO">Mayo</option>
                    <option value="JUNIO">Junio</option>
                    <option value="JULIO">Julio</option>
                    <option value="AGOSTO">Agosto</option>
                    <option value="SEPTIEMBRE">Septiembre</option>
                    <option value="OCTUBRE">Octubre</option>
                    <option value="NOVIEMBRE">Noviembre</option>
                    <option value="DICIEMBRE">Diciembre</option>

                </select>

            </div>

        </div>

        <!-- BOTON -->

        <button
            onclick="buscarTurnos()"
            class="w-full bg-blue-600 text-white rounded-lg p-3 font-bold hover:bg-blue-700"
        >
            Buscar Turnos
        </button>

        <!-- RESULTADO -->

        <div id="resultado" class="mt-8"></div>

    </div>

</div>

<script>

// =====================================================
// JSONBIN
// =====================================================

const BIN_ID = "6a0e1a9dee5a733b12f13db1";

const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

// =====================================================
// VARIABLES
// =====================================================

let cuadrantes = {};

// =====================================================
// TOAST
// =====================================================

function mostrarToast(texto) {

    const toast = document.createElement("div");

    toast.className = "toast";

    toast.innerText = texto;

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 3000);
}

// =====================================================
// CARGAR DIAS
// =====================================================

function cargarDias() {

    const selectDia = document.getElementById("dia");

    for (let i = 1; i <= 31; i++) {

        const option = document.createElement("option");

        option.value = i;

        option.textContent = i;

        selectDia.appendChild(option);
    }
}

// =====================================================
// CARGAR DATOS
// =====================================================

async function cargarDatosOnline() {

    try {

        mostrarToast("Cargando cuadrantes...");

        const response = await fetch(JSONBIN_URL);

        if (!response.ok) {

            throw new Error("Error cargando JSONBin");
        }

        const json = await response.json();

        cuadrantes = json.record.cuadrantes;

        console.log(cuadrantes);

        mostrarToast("Cuadrantes actualizados");

    } catch (error) {

        console.error(error);

        mostrarToast("Error cargando datos");
    }
}

// =====================================================
// BUSCAR TURNOS
// =====================================================

function buscarTurnos() {

    const dia = parseInt(document.getElementById("dia").value);

    const nombreMes = document
        .getElementById("mes")
        .value
        .toUpperCase();

    const resultado = document.getElementById("resultado");

    resultado.innerHTML = "";

    // =================================================
    // BUSCAR MES IGNORANDO MAYUSCULAS
    // =================================================

    let datosMes = null;

    for (const clave in cuadrantes) {

        if (clave.toUpperCase() === nombreMes) {

            datosMes = cuadrantes[clave];
            break;
        }
    }

    // =================================================
    // SIN DATOS
    // =================================================

    if (!datosMes) {

        resultado.innerHTML = `
            <div class="bg-red-100 text-red-700 p-4 rounded-lg">
                No hay datos para este mes
            </div>
        `;

        return;
    }

    // =================================================
    // ARRAYS
    // =================================================

    const manana = [];
    const noche = [];
    const playa = [];
    const vacaciones = [];
    const extras = [];

    // =================================================
    // RECORRER DATOS
    // =================================================

    datosMes.forEach(item => {

        if (parseInt(item.dia) !== dia) return;

        const turno = item.turno.trim();

        // MAÑANA

        if (turno === "M") {

            manana.push(item.agente);
        }

        // NOCHE

        else if (turno === "N") {

            noche.push(item.agente);
        }

        // PLAYA

        else if (turno === "PL") {

            playa.push(item.agente);
        }

        // VACACIONES

        else if (turno === "VA") {

            vacaciones.push(item.agente);
        }

        // HORAS EXTRA

        else if (
            turno === "HM" ||
            turno === "HN" ||
            turno === "Hm" ||
            turno === "Ht" ||
            turno === "Hn" ||
            turno === "HPL"
        ) {

            let horario = "";

            if (turno === "HM") {
                horario = "07:00 - 19:00";
            }

            else if (turno === "HN") {
                horario = "19:00 - 07:00";
            }

            else if (turno === "Hm") {
                horario = "06:00 - 14:00";
            }

            else if (turno === "Ht") {
                horario = "14:00 - 22:00";
            }

            else if (turno === "Hn") {
                horario = "22:00 - 06:00";
            }

            else if (turno === "HPL") {
                horario = "12:00 - 20:00";
            }

            extras.push(
                `${item.agente} → ${turno} (${horario})`
            );
        }

    });

    // =================================================
    // GENERAR HTML
    // =================================================

    let html = `

        <div class="space-y-4">

            <h2 class="text-3xl font-bold text-center mb-6">
                Turnos del ${dia} de ${nombreMes}
            </h2>

            <!-- PRIMERA FILA -->

            <div class="grid md:grid-cols-3 gap-4">

                <!-- MAÑANA -->

                <div class="bg-blue-100 p-5 rounded-2xl shadow">

                    <h3 class="text-2xl font-bold mb-4">
                        🌞 Mañana
                    </h3>

                    ${
                        manana.length > 0
                        ?
                        `<ul class="list-disc ml-5">
                            ${manana.map(a => `<li>${a}</li>`).join("")}
                        </ul>`
                        :
                        "<p>Sin servicio</p>"
                    }

                </div>

                <!-- NOCHE -->

                <div class="bg-indigo-100 p-5 rounded-2xl shadow">

                    <h3 class="text-2xl font-bold mb-4">
                        🌙 Noche
                    </h3>

                    ${
                        noche.length > 0
                        ?
                        `<ul class="list-disc ml-5">
                            ${noche.map(a => `<li>${a}</li>`).join("")}
                        </ul>`
                        :
                        "<p>Sin servicio</p>"
                    }

                </div>

                <!-- PLAYA -->

                <div class="bg-yellow-100 p-5 rounded-2xl shadow">

                    <h3 class="text-2xl font-bold mb-4">
                        🏖️ Playa
                    </h3>

                    ${
                        playa.length > 0
                        ?
                        `<ul class="list-disc ml-5">
                            ${playa.map(a => `<li>${a}</li>`).join("")}
                        </ul>`
                        :
                        "<p>Sin servicio</p>"
                    }

                </div>

            </div>

            <!-- SEGUNDA FILA -->

            <div class="grid md:grid-cols-3 gap-4">

                <!-- VACACIONES -->

                <div class="bg-green-100 p-5 rounded-2xl shadow">

                    <h3 class="text-2xl font-bold mb-4">
                        🌴 Vacaciones
                    </h3>

                    ${
                        vacaciones.length > 0
                        ?
                        `<ul class="list-disc ml-5">
                            ${vacaciones.map(a => `<li>${a}</li>`).join("")}
                        </ul>`
                        :
                        "<p>Sin vacaciones</p>"
                    }

                </div>

                <!-- EXTRAS -->

                <div class="bg-red-100 p-5 rounded-2xl shadow md:col-span-2">

                    <h3 class="text-2xl font-bold mb-4">
                        ⏰ Horas Extras
                    </h3>

                    ${
                        extras.length > 0
                        ?
                        `<ul class="list-disc ml-5">
                            ${extras.map(a => `<li>${a}</li>`).join("")}
                        </ul>`
                        :
                        "<p>Sin horas extras</p>"
                    }

                </div>

            </div>

        </div>
    `;

    resultado.innerHTML = html;
}

// =====================================================
// INICIO
// =====================================================

window.addEventListener("load", async () => {

    cargarDias();

    await cargarDatosOnline();

    const hoy = new Date();

    document.getElementById("dia").value = hoy.getDate();

    const meses = [
        "ENERO",
        "FEBRERO",
        "MARZO",
        "ABRIL",
        "MAYO",
        "JUNIO",
        "JULIO",
        "AGOSTO",
        "SEPTIEMBRE",
        "OCTUBRE",
        "NOVIEMBRE",
        "DICIEMBRE"
    ];

    document.getElementById("mes").value =
        meses[hoy.getMonth()];
});

</script>

</body>
</html>
